<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>해외선물 전문가의 주요 체크리스트 - Pro</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <checklist-header></checklist-header>
    
    <main class="dashboard-grid">
      <div class="main-column">
        <section class="section-market">
          <h2>시장 요약 및 변동성 (Investing.com 기준)</h2>
          <div class="asset-grid">
            <asset-card type="currency" symbol="USD/KRW" label="원/달러 환율" value="1,508.35" trend="up" points="1480,1495,1490,1502,1498,1505,1508.35"></asset-card>
            <asset-card type="commodity" symbol="Gold" label="금 선물 (Gold/USD)" value="4,524.30" trend="up" points="4380,4420,4450,4430,4480,4510,4524.30"></asset-card>
            <asset-card type="index" symbol="NDX 100" label="나스닥 100 지수" value="23,132.77" trend="down" points="23600,23550,23700,23450,23350,23200,23132.77"></asset-card>
          </div>
        </section>

        <section class="section-news">
          <h2>주요 글로벌 마켓 뉴스 (TOP 5)</h2>
          <korean-news></korean-news>
        </section>
      </div>

      <aside class="side-column">
        <section class="section-calendar">
          <h2>미국 주요 지표 발표 일정</h2>
          <us-indicators></us-indicators>
        </section>
      </aside>
    </main>

    <footer class="app-footer">
      <p>&copy; 2026 Global Futures Expert Pro. All rights reserved.</p>
    </footer>
  </div>

  <script defer type="module" src="/main.js"></script>
